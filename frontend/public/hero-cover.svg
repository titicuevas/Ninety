<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none" role="img" aria-label="Aficionados reviviendo sus mejores partidos de f·tbol">
  <defs>
    <linearGradient id="sky" x1="600" y1="0" x2="600" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0a0b"/>
