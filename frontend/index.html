<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ninety — Tu diario futbolero. Guarda y revive todos los partidos que has visto." />
    <meta name="theme-color" content="#0a0a0b" />
    <meta property="og:title" content="Ninety — Tu diario futbolero" />
    <meta property="og:description" content="Estamos construyendo tu diario futbolero. Pronto podrás guardar todos tus partidos." />
    <meta property="og:type" content="website" />
    <title>Ninety — Tu diario futbolero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      body { margin: 0; background: #0a0a0b; color: #fafafa; font-family: Inter, system-ui, sans-serif; }
      .ninety-splash {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        text-align: center;
        padding: 1.5rem;
      }
      .ninety-splash__logo {
        width: 3rem; height: 3rem; border-radius: 0.75rem;
        background: #10b981; color: #052e16;
        display: flex; align-items: center; justify-content: center;
        font-weight: 700; font-size: 0.875rem;
      }
      .ninety-splash__badge {
        font-size: 0.75rem; color: #6ee7b7;
        border: 1px solid #10b98155; background: #10b98115;
        padding: 0.25rem 0.75rem; border-radius: 999px;
      }
      .ninety-splash__title { font-size: 1.75rem; font-weight: 700; margin: 0; }
      .ninety-splash__tagline { color: #a1a1aa; max-width: 20rem; line-height: 1.5; font-size: 0.9375rem; margin: 0; }
      .ninety-splash__spinner {
        width: 1.75rem; height: 1.75rem; margin-top: 0.5rem;
        border: 2px solid #10b981; border-top-color: transparent;
        border-radius: 50%; animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <noscript>
      <div class="ninety-splash">
        <div class="ninety-splash__logo">90</div>
        <p class="ninety-splash__title">Ninety</p>
        <p class="ninety-splash__tagline">Tu diario futbolero. Activa JavaScript para continuar.</p>
      </div>
    </noscript>
    <div id="root">
      <div class="ninety-splash" aria-live="polite" aria-busy="true">
        <div class="ninety-splash__logo">90</div>
        <span class="ninety-splash__badge">En desarrollo</span>
        <p class="ninety-splash__title">Ninety</p>
        <p class="ninety-splash__tagline">Montando tu diario futbolero…</p>
        <div class="ninety-splash__spinner" role="status" aria-label="Cargando"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
