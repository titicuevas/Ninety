    <radialGradient id="spotlight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 280) rotate(90) scale(320 220)">
      <stop stop-color="#34d399" stop-opacity="0.22"/>
