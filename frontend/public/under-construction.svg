<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="Estadio en obras, pronto abrir· Ninety">
  <defs>
    <linearGradient id="sky" x1="400" y1="0" x2="400" y2="500">
      <stop stop-color="#0a0a0b"/>
      <stop offset="1" stop-color="#0f1a17"/>
    </linearGradient>
    <linearGradient id="pitch" x1="200" y1="280" x2="600" y2="380">
      <stop stop-color="#166534"/>
      <stop offset="1" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#sky)"/>
  <ellipse cx="400" cy="420" rx="340" ry="80" fill="#10b981" opacity="0.08"/>

  <!-- Gradas en obras -->
  <path d="M60 360 Q400 120 740 360" stroke="#3f3f46" stroke-width="3" fill="none"/>
  <path d="M120 340 Q400 180 680 340" stroke="#52525b" stroke-width="2" stroke-dasharray="10 8" fill="none"/>

  <!-- Gr˙a -->
  <rect x="580" y="130" width="8" height="210" fill="url(#beam)"/>
  <rect x="420" y="130" width="168" height="8" fill="url(#beam)"/>
  <line x1="588" y1="138" x2="588" y2="110" stroke="#fbbf24" stroke-width="3"/>
  <line x1="588" y1="110" x2="640" y2="110" stroke="#fbbf24" stroke-width="3"/>
  <line x1="640" y1="110" x2="640" y2="160" stroke="#71717a" stroke-width="2"/>
  <rect x="632" y="160" width="16" height="12" rx="2" fill="#71717a"/>

  <!-- Campo -->
  <ellipse cx="400" cy="390" rx="280" ry="70" fill="url(#pitch)"/>
  <ellipse cx="400" cy="390" rx="280" ry="70" stroke="#22c55e" stroke-width="2" opacity="0.4"/>
  <circle cx="400" cy="390" r="36" stroke="#4ade80" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="320" x2="400" y2="460" stroke="#4ade80" stroke-width="2" opacity="0.35"/>

  <!-- Conos y balÛn -->
  <polygon points="220,400 230,378 240,400" fill="#f97316"/>
  <polygon points="255,408 265,386 275,408" fill="#f97316"/>
  <circle cx="400" cy="375" r="18" fill="#fafafa"/>
  <path d="M400 360 L408 372 L400 384 L392 372 Z" fill="#18181b"/>
  <path d="M400 360 L415 368 L408 384 L392 376 Z" fill="#27272a" opacity="0.6"/>

  <!-- Cartel obras -->
  <rect x="300" y="200" width="200" height="72" rx="10" fill="#141416" stroke="#10b981" stroke-width="2"/>
  <text x="400" y="232" text-anchor="middle" fill="#10b981" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="3">EN OBRAS</text>
  <text x="400" y="256" text-anchor="middle" fill="#a1a1aa" font-family="Inter, system-ui, sans-serif" font-size="11">Pronto abrimos el estadio</text>

  <!-- Logo 90 -->
  <rect x="368" y="48" width="64" height="64" rx="14" fill="#10b981"/>
  <text x="400" y="92" text-anchor="middle" fill="#052e16" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800">90</text>
</svg>
